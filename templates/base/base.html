{% load static %}

<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description"
              content="{% block meta_description %}{% endblock meta_description %}" />
        <meta name="keywords"
              content="{% block meta_keywords %}{% endblock meta_keywords %}" />
        <title>
            {% block title %}
            {% endblock title %}
        </title>
    </head>
    <body>
        {% block content %}
        {% endblock content %}
    </body>
</html>
